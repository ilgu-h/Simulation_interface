name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend (dev)
        run: |
          python -m pip install --upgrade pip
          pip install pytest-cov -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Unit + integration tests
        run: pytest tests/unit tests/integration -q --cov=app --cov-fail-under=70

  frontend:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build

  # Smoke tests require ASTRA-sim built from source + submodules.
  # Run on a schedule or manually; too heavy for every push.
  # To run locally: cd backend && pytest tests/smoke -q
