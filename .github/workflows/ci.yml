name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # app/parsers/et_traces.py imports chakra.schema.protobuf.et_def_pb2,
      # so the chakra submodule must be present, patched, compiled, and
      # installed as an editable package. Mirrors scripts/bootstrap.sh but
      # stays lightweight (avoids astra-sim + symbolic_tensor_graph, which
      # are only needed for smoke tests).
      - name: Install chakra (et_traces dependency)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler
          git submodule update --init --depth 1 frameworks/chakra
          # astra-sim is also shallow-cloned because
          # tests/integration/test_api_health.py::test_runs_validate_reference
          # points at one of its bundled example .et files. We do not build
          # astra-sim in CI (smoke tests run elsewhere), we just need the
          # checked-in workload traces.
          git submodule update --init --depth 1 frameworks/astra-sim
          # Strip [build_grpc] cmdclass so pip install does not need
          # grpc-tools (mirrors scripts/bootstrap.sh section 3b).
          cat > frameworks/chakra/setup.cfg <<'EOF'
          # Local patch (CI): see scripts/bootstrap.sh for rationale.
          EOF
          cat > frameworks/chakra/setup.py <<'EOF'
          from setuptools import setup
          setup()
          EOF
          protoc --proto_path=frameworks/chakra/schema/protobuf \
                 --python_out=frameworks/chakra/schema/protobuf \
                 frameworks/chakra/schema/protobuf/et_def.proto
          python -m pip install --upgrade pip
          pip install -e frameworks/chakra
      - name: Install backend (dev)
        run: |
          pip install pytest-cov -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Unit + integration tests
        env:
          # Ubuntu 22.04's protoc (3.12) generates pb2 files that the
          # chakra-installed protobuf Python runtime (4.x/5.x) refuses to
          # load via the C++ descriptor pool. The pure-Python parser works
          # regardless of the version skew and is fast enough for CI.
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
        # Coverage gate is 55% here but 80%+ locally: CI skips
        # tests/integration/test_api_results.py (10 tests, gated on the
        # ASTRA-sim binary being built). Building astra-sim in CI would add
        # several minutes per run; covered instead by out-of-CI smoke tests.
        run: pytest tests/unit tests/integration -q --cov=app --cov-fail-under=55

  frontend:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build

  # Smoke tests require ASTRA-sim built from source + submodules.
  # Run on a schedule or manually; too heavy for every push.
  # To run locally: cd backend && pytest tests/smoke -q
